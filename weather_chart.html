<!DOCTYPE html>
<html>
  <head>
    <title>Precipitation Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <canvas id="precipChart" width="400" height="200"></canvas>
    <script>
      // Sample data (replace with actual API data)
      const data = {
        labels: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5"],
        datasets: [
          {
            label: "Precipitation (mm)",
            data: [5, 0, 2, 8, 3],
            backgroundColor: "#4CAF50",
            borderColor: "#388E3C",
            borderWidth: 1,
          },
        ],
      };

      const config = {
        type: "bar",
        data: data,
        options: {
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Precipitation (mm)",
              },
            },
            x: {
              title: {
                display: true,
                text: "Day",
              },
            },
          },
        },
      };

      const precipChart = new Chart(
        document.getElementById("precipChart"),
        config
      );
    </script>
  </body>
</html>
